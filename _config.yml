# Site
name: "미남과 오컬트와 자살"
title: "Hanshu"
description: "《한서》의 세계에 관해 이야기합니다."
image: 'assets/images/title-image.jpeg'
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ''
url: 'https://zya-han.github.io'
google_analytics: 'G-BGPF88VHK2'
disqus: 'demowebsite'
include: ["_pages"]
permalink: /:title/
excerpt_separator: <!--more-->

# Authors
authors:
  zya:
    name: zya
    display_name: 주아
    avatar: 'assets/images/zya.png'
    email: chiclaxica@gmail.com
    web: https://zya-han.github.io
    # twitter: https://twitter.com/wowthemesnet
    description: "《한서》 파는 사람"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
