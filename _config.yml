# Site
name: "미남과 오컬트와 자살"
title: "Hanshu"
description: "《한서》 이야기를 합니다."
title_image: 'assets/images/title-image.jpeg'
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ''
url: 'https://zya-han.github.io'
google_analytics: 'G-BGPF88VHK2'
disqus: 'demowebsite'
include:
  - _pages
  - _headers
  - assets
permalink: /:title/
encoding: utf-8
slugify: none
excerpt_separator: <!--more-->

# Categories
categories: ["한나라 설정집", "삼국연의 읽기", "삼국지 질의응답", "잡담", "자살하기에는 너무 늦어 버려서"]

# Authors
authors:
  sal:
    name: Sal
    display_name: Sal
    gravatar: e56154546cf4be74e393c62d1ae9f9d4
    email: wowthemesnet@gmail.com
    web: https://www.wowthemes.net
    twitter: https://twitter.com/wowthemesnet
    description: "Author of Mediumish, a Bootstrap Medium styled template available for WordPress, HTML, Ghost and Jekyll. You are currently previewing Jekyll template demo."
  john:
    name: John
    display_name: John    
    avatar: 'assets/images/avatar.png'
    gravatar: b1cc14991db7a456fcd761680bbc8f81
    email: wowthemesnet@gmail.com
    web: https://www.wowthemes.net
    twitter: https://twitter.com/wowthemesnet
    description: "This is the author box. Write a short description of the author here. You are currently previewing Mediumish demo, a Jekyll template compatible with Github pages."

# Plugins
plugins:
  - jekyll-paginate
  # - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 12
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock, naver17d7a003d22fee8ea03c0fe52809be3b.html, googlec0292155b7221008.html]

# set timezone
timezone: Asia/Seoul


defaults:
  -
    scope:
      path: ""
    values:
      author: zya
      image: 'assets/images/title-image.jpeg'
      headers:
        Content-Security-Policy: "script-src 'self' https://*.disqus.com https://*.disquscdn.com https://*.disqus.net;"

